<script>
        // Micro-interaction: Form input shaking effect on empty submit
        const form = document.getElementById('login-form');
        form.addEventListener('submit', (e) => {
            const inputs = form.querySelectorAll('input');
            let hasEmpty = false;
            inputs.forEach(input => {
                if (!input.value) {
                    hasEmpty = true;
                    input.parentElement.classList.add('animate-shake');
                    setTimeout(() => input.parentElement.classList.remove('animate-shake'), 400);
                }
            });
            if (hasEmpty) {
                e.preventDefault();
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-4px) rotate(-1deg); }
                75% { transform: translateX(4px) rotate(1deg); }
            }
            .animate-shake {
                animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both 2;
            }
        `;
        document.head.appendChild(style);

        // Interactive "Inky" mouse follow effect for the card
        const card = document.querySelector('main');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                const rotateX = (y - rect.height / 2) / 40;
                const rotateY = (rect.width / 2 - x) / 40;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            } else {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            }
        });
    </script>
